name: run lotteryscrape.py
 
on: #[push]         
  schedule:
   - cron: '0 6 * * *'
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: checkout repo content
        uses: actions/checkout@v2 # checkout the repository content to github runner

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12' # install the python version needed
          
      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: List files in workspace root
        run: ls -laR $GITHUB_WORKSPACE
        shell: bash # Ensure bash for ls -laR

      - name: Show Current Working Directory
        run: pwd
        shell: bash

      - name: Show Python Path
        run: python -c "import sys; print('\n'.join(sys.path))"

      - name: Install geckodriver
        run: |
          GECKO_VER=$(curl -sS "https://api.github.com/repos/mozilla/geckodriver/releases/latest" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          curl -sL "https://github.com/mozilla/geckodriver/releases/download/${GECKO_VER}/geckodriver-${GECKO_VER}-linux64.tar.gz" | tar xz -C /usr/local/bin
      
      - name: execute py script # run lotteryscrape.py
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WDM_LOCAL: "1"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Fallback: raises limit from 60→5000/hr
        run: python lotteryscraped_optimized_condensed_dual.py
          
      - name: commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff-index --quiet HEAD || (git commit -a -m "updated logs" --allow-empty)
          
      - name: push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main 
